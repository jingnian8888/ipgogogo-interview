<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPGOGOGO 体验访谈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
  #app { width: 100%; max-width: 640px; }
  .header { background: #fff; border-radius: 16px; padding: 20px 24px; margin-bottom: 12px; border: 1px solid #e8e8e4; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-size: 15px; font-weight: 600; color: #0a0a0a; display: flex; align-items: center; gap: 6px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; }
  .tag { font-size: 12px; color: #888; background: #f5f5f0; padding: 3px 10px; border-radius: 20px; }
  .prog-bar { height: 4px; background: #ebebeb; border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.5s ease; width: 0%; }
  .chat-area { background: #fff; border-radius: 16px; border: 1px solid #e8e8e4; padding: 20px; min-height: 420px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 12px; max-height: 520px; overflow-y: auto; }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 86%; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg-name { font-size: 11px; color: #aaa; padding: 0 4px; }
  .msg.user .msg-name { text-align: right; }
  .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; }
  .ai .bubble { background: #f5f5f0; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .user .bubble { background: #0F6E56; color: #fff; border-bottom-right-radius: 4px; }
  .typing-bubble { padding: 12px 16px; background: #f5f5f0; border-radius: 18px; border-bottom-left-radius: 4px; display: flex; gap: 5px; align-items: center; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: blink 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .input-card { background: #fff; border-radius: 16px; border: 1px solid #e8e8e4; padding: 16px; }
  .input-card textarea { width: 100%; resize: none; border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: inherit; background: #fafafa; color: #1a1a1a; line-height: 1.6; min-height: 52px; max-height: 120px; overflow-y: auto; outline: none; transition: border-color 0.2s; }
  .input-card textarea:focus { border-color: #1D9E75; background: #fff; }
  .input-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .hint-text { font-size: 12px; color: #bbb; }
  .send-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 9px 20px; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
  .send-btn:hover { background: #0F6E56; }
  .send-btn:disabled { background: #ccc; cursor: not-allowed; }
  .summary-card { background: #fff; border-radius: 16px; border: 1px solid #e8e8e4; padding: 20px 24px; margin-top: 12px; }
  .sum-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .sum-title::before { content: ''; width: 4px; height: 18px; background: #1D9E75; border-radius: 2px; display: inline-block; }
  .sum-item { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; padding: 12px; background: #f9f9f7; border-radius: 10px; }
  .sum-icon { font-size: 16px; flex-shrink: 0; }
  .sum-text { font-size: 13px; color: #333; line-height: 1.6; }
  .restart-btn { margin-top: 16px; font-size: 13px; color: #1D9E75; border: 1px solid #a8ddc9; background: transparent; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; }
  .restart-btn:hover { background: #f0faf6; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo"><span class="logo-dot"></span>IPGOGOGO 体验访谈</div>
      <span class="tag">约 3 分钟</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div class="input-card" id="input-card" style="display:none;">
    <textarea id="inp" placeholder="请输入你的想法，AI 会根据你的回答追问…" rows="2"></textarea>
    <div class="input-footer">
      <span class="hint-text">Enter 发送 · Shift+Enter 换行</span>
      <button class="send-btn" id="sbtn">发送 ↑</button>
    </div>
  </div>
  <div id="result-area"></div>
</div><script>
const SYSTEM = `你是 IPGOGOGO 的用户研究访谈员，正在对刚完成9.9元体验的专利代理师进行深度访谈。

---

【研究目标】
收集以下维度的数据，按优先级排序：

核心（必须收集）：
1. 行为维度：用户实际做了什么、操作路径是什么
2. 体验维度：哪一步最有感觉、哪一步最卡
3. 态度维度：用完之后对继续使用的真实想法（自然流露即记录，不强问）

加分项（自然挖掘）：
4. 心理价位：仅在用户表达价值时轻量探测（不锚定、不引导）
5. 场景维度：什么情况下会用、用什么替代
6. NPS：0-10分推荐意愿及原因

---

【产品背景】
IPGOGOGO 是 AI 辅助专利撰写系统，包含撰写、检索、审查、优化、答复等能力。

⚠️ 不主动报出功能列表
⚠️ 不主动报出任何价格或套餐信息

---

# 🧠 核心方法：回忆式行为还原（必须遵守）

所有分析必须从"刚刚发生的使用行为"推导：

❌ 不问：
- 你用了哪些功能？

✅ 改为：
- 用户说出功能名称后，直接从"系统输出"开始追问："它给您生成的结果，您第一眼感觉怎么样？"
- "有没有哪个地方您觉得需要自己再改？"
- "最后您拿这个结果做了什么？"

👉 功能通过行为推断：
- 生成 = 撰写
- 修改 = 优化
- 对比 = 审查
- 查找 = 检索

---

# 🧭 对话规则

- 松结构，不强制阶段
- 强目标：始终围绕4类研究目标
- 每次只问一个问题（2-3句）
- 不出现选项列表
- 像复盘同事工作，不像问卷

---

# 🧠 用户回答处理规则

抽象回答必须追问具体行为：

- 用户："还不错" → "刚刚哪一步让你觉得还不错？"
- 用户："挺方便" → "具体是哪个操作让你觉得省事？"
- 用户："一般" → "在哪一步开始觉得一般的？"

---

# 📊 信息密度控制机制（防过度追问）

每次用户回复后，判断信息密度再决定下一步：

## 高密度信号（可以深入）
- 用户给出具体操作步骤
- 提到明确卡点
- 提到具体替代方式
👉 可以继续深挖同一维度

## 中密度信号（正常推进）
- "还可以""一般""挺好"
👉 只允许再追问1层具体行为，追问无果则切换维度

## 低密度信号（必须换方向）
- "还行""不知道""没什么"
👉 必须立即切换维度：行为 → 场景 → 替代 → 体验
👉 不在同一维度继续消耗

---

# 💰 付费意愿与心理价位探测

⚠️ 核心原则：不主动引导商业化思考

只有在用户自然表达"价值信号"时才进入（如：值不值、想不想继续用、是否有替代、明确效果评价）

## ① 价值确认（必须先做）
- "刚刚哪个部分让你觉得最有价值？"

## ② 非直接付费探测（轻量）
仅在用户表达价值后：
- "这种事情你平时更倾向自己处理还是借助工具？"
- "如果以后长期处理这种任务，你更希望怎么解决？"

## ③心理价位探测（自然化版本）
⚠️ 只在用户表达价值后触发

不要使用：
- 成本结构
- 外包模型

改为更自然的感知方式：

① 轻探测
“这种事情你一般会选择自己花时间做，还是借助工具？”

② 替代感知
“如果以后经常遇到这种情况，你会倾向怎么处理比较省心？”

③ 数字出现后
用户如果主动给出价格 → 只追问：
“你这个判断主要是基于什么经验？”

---

# 🔄 用户问题处理方式

不直接回答问题，而是挖需求：

- "你们有没有xx功能" → "您问这个，是在使用中遇到了什么情况？"
- "这个怎么用" → "您想用它来处理哪个环节？"
- "为什么会这样" → "您当时操作的时候发生了什么？"
- "价格是多少" → "您问价格，是已经在考虑继续使用了吗？"

---

# 🧯 数据安全处理

用户问数据安全时：

Step1：轻共鸣（必须）
“这个问题很多做专利的用户都会关心。”

Step2：极简回应（不要扩展）
“我们有基本的数据安全保障机制。”

Step3：立即回到行为（核心）
“您刚刚是在哪一步开始有这个顾虑的？”

---

# 🔄 敷衍用户处理

第一轮追问（换具体角度）：
- "还行" → "刚刚哪一步让你觉得还行？"
- "不知道" → "有没有哪个地方让你停顿过？"
- "没什么" → "如果改一个地方，你会改哪里？"
- "还好" → "具体是哪个环节？"

连续2轮无有效信息：
- 不再继续追问同一维度
- 切换维度：行为 → 场景 / 场景 → 替代 / 替代 → 价值

连续3轮仍无新增信息：
- 自动降低问题强度，从"具体行为"转向"整体体验"
- 例如："整体用下来，感觉跟您预期的差距大吗？"

---

# 📊 NPS 收集

访谈后期自然询问一次：
- "0到10分，你愿意推荐给同行吗？"
- 追问："这个分数主要来自刚刚哪个体验？"

---

# ⚙️ 结束机制（信号驱动优化版）

满足以下任意2类即可结束：

A类：行为信息 → 用户已描述完整使用流程
B类：价值信息 → 有明确价值点或问题点
C类：态度信息 → 如有自然表达则记录，没有不强问
D类：补充信息 → 替代方案或使用场景已覆盖

优化原则：
- C类（态度）是加分项，不是强制项
- 不强行制造态度表达
- 优先保证对话自然性

---

# 🧾 结束语

结束时只说感谢语，不提退款、不提价格、不做任何承诺，末尾加 [DONE]：

"非常感谢您的反馈，这些信息对我们优化产品非常重要，我们会认真改进！[DONE]"`;

const chat = document.getElementById('chat');
const inputCard = document.getElementById('input-card');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
let history = [], turns = 0, done = false;

function setProgress(n) {
  document.getElementById('prog').style.width = Math.min(Math.round(n/10*100),100)+'%';
}
function addBubble(role, text) {
  const d = document.createElement('div');
  d.className = 'msg '+role;
  const clean = text.replace(/\[DONE\]/g,'').trim();
  d.innerHTML = `<span class="msg-name">${role==='ai'?'访谈员':'你'}</span><div class="bubble">${clean.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function showTyping() {
  const d = document.createElement('div');
  d.className='msg ai'; d.id='typing';
  d.innerHTML=`<span class="msg-name">访谈员</span><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}
function removeTyping() { const e=document.getElementById('typing'); if(e) e.remove(); }

async function askAI(userMsg) {
  history.push({role:'user', content:userMsg});
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:1000, system:SYSTEM, messages:history})
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error||res.status); }
  const data = await res.json();
  const reply = data.content?.map(b=>b.text||'').join('')||'';
  history.push({role:'assistant', content:reply});
  return reply;
}

async function genSummary() {
  const tx = history.map(m=>(m.role==='user'?'用户: ':'访谈员: ')+m.content).join('\n');
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:800, messages:[{role:'user',content:`请根据以下专利代理师访谈记录，提炼4条关键洞察，重点关注：购买意向、核心障碍、产品满意度、用户建议。每条一句话，用"-"开头，直接具体。\n\n${tx}`}]})
  });
  const data=await res.json();
  return data.content?.map(b=>b.text||'').join('')||'';
}

async function saveToRedis(summary) {
  const conversation = history.map(m =>
    (m.role === 'user' ? '【用户】' : '【访谈员】') + m.content
  ).join('\n\n');
  try {
    await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation, summary })
    });
  } catch(e) { console.error('保存失败', e); }
}

function showSummary(text) {
  saveToRedis(text); // 摘要静默保存，不展示给用户
  document.getElementById('result-area').innerHTML=`
    <div class="summary-card" style="text-align:center; padding:32px 24px;">
      <div style="font-size:36px; margin-bottom:12px;">🎉</div>
      <div style="font-size:16px; font-weight:600; color:#1a1a1a; margin-bottom:8px;">感谢您的参与！</div>
      <div style="font-size:14px; color:#888; line-height:1.8;">您的反馈对我们非常宝贵，我们会认真改进产品体验。<br>退款将在 3 个工作日内原路退回<br>如有问题请联系客服微信：IPGOGOGO666 </div>
    </div>`;
}

async function handleSend() {
  const val=inp.value.trim();
  if(!val||done) return;
  inp.value=''; inp.style.height='auto';
  sbtn.disabled=true; inputCard.style.display='none';
  turns++; setProgress(turns);
  addBubble('user',val); showTyping();
  try {
    const reply=await askAI(val);
    removeTyping(); addBubble('ai',reply);
    if(reply.includes('[DONE]')) {
      done=true; setProgress(10);
      showTyping();
      const summary=await genSummary();
      removeTyping(); showSummary(summary);
    } else {
      inputCard.style.display='block'; sbtn.disabled=false; inp.focus();
    }
  } catch(e) {
    removeTyping();
    addBubble('ai',`出了点问题（${e.message}），请稍后重试。`);
    inputCard.style.display='block'; sbtn.disabled=false;
  }
}

function restart() {
  history=[]; turns=0; done=false;
  chat.innerHTML=''; document.getElementById('result-area').innerHTML='';
  setProgress(0); init();
}

function init() {
  const opening='您好！感谢体验 IPGOGOGO，占用您几分钟聊聊感受。\n\n您这次主要用了哪个功能？用完之后第一反应是什么？';
  history.push({role:'assistant',content:opening});
  addBubble('ai',opening);
  inputCard.style.display='block'; inp.focus();
}

sbtn.addEventListener('click',handleSend);
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} });
inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });
init();
</script>
</body>
</html>
